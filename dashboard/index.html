<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Shorts Automation Dashboard V2</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .row-selected { background-color: rgba(99, 102, 241, 0.2) !important; border-left: 4px solid #6366f1; }
        .progress-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col gap-6">

    <header class="glass rounded-2xl p-6 text-center shadow-lg">
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-2 tracking-tight">
            VS Shorts Automation ⚡️
        </h1>
        <p class="text-slate-400 text-sm md:text-base">Hot Issues Management & Auto-Publishing Pipeline</p>
    </header>

    <main class="flex flex-col xl:flex-row gap-6 h-full flex-1 min-h-[600px]">
        
        <!-- Left Column: Data List & Controls -->
        <div class="flex-1 glass rounded-2xl p-6 flex flex-col gap-4 overflow-hidden shadow-2xl relative">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-700/80 pb-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <span class="w-2 h-6 bg-indigo-500 rounded-full inline-block shadow-[0_0_10px_rgba(99,102,241,0.5)]"></span>
                    Issue Repository
                </h2>
                <!-- Button 1: 가져오기 -->
                <button id="btnFetch" onclick="fetchNewIssues()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-lg flex items-center gap-2 w-full sm:w-auto justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    오늘의 핫이슈 VS 주제 가져오기
                </button>
            </div>

            <div class="overflow-y-auto flex-1 border border-slate-700/50 rounded-xl relative bg-slate-900/30">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-slate-800/80 sticky top-0 z-10 backdrop-blur-md">
                        <tr>
                            <th class="p-4 font-semibold text-slate-300">Date</th>
                            <th class="p-4 font-semibold text-slate-300">Category</th>
                            <th class="p-4 font-semibold text-slate-300">Match-Up</th>
                            <th class="p-4 font-semibold text-slate-300">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700/50">
                        <!-- JS injected rows -->
                    </tbody>
                </table>
                <div id="loadingIndicator" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-600 border-t-indigo-500"></div>
                </div>
            </div>
        </div>

        <!-- Right Column: 9:16 Preview & Actions -->
        <div class="w-full xl:w-[420px] glass rounded-2xl p-6 flex flex-col gap-5 flex-shrink-0 shadow-2xl">
            <h2 class="text-xl font-semibold flex items-center gap-2 border-b border-slate-700/80 pb-3">
                <span class="w-2 h-6 bg-purple-500 rounded-full inline-block shadow-[0_0_10px_rgba(168,85,247,0.5)]"></span>
                Shorts Preview Panel
            </h2>

            <!-- Mobile Preview Aspect Ratio Container (9:16) -->
            <div class="relative w-full aspect-[9/16] bg-black rounded-[2rem] border-8 border-slate-800 shadow-2xl overflow-hidden flex flex-col justify-between mx-auto max-w-[360px]" id="previewCard">
                
                <!-- Default Empty State -->
                <div id="emptyPreview" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 p-8 text-center bg-slate-900 z-20 transition-opacity duration-300">
                    <svg class="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <p class="text-sm font-medium">리스트에서 항목을 선택하고<br><strong class="text-slate-300">결과물 보기</strong> 버튼을 누르세요.</p>
                </div>

                <!-- Actual Preview (Hidden by default) -->
                <div id="activePreview" class="absolute inset-0 flex flex-col hidden bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop')] bg-cover bg-center">
                    <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-black/40 to-black/90"></div>
                    
                    <!-- Top Title -->
                    <div class="relative z-10 pt-16 px-4 text-center transform transition-transform duration-700 translate-y-0" id="animTitle">
                        <h3 class="text-[2.5rem] font-black text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)] leading-tight tracking-tighter">
                            기적을<br>만들어보자
                        </h3>
                    </div>

                    <!-- Center Match Up -->
                    <div class="relative z-10 flex-1 flex flex-col items-center justify-center px-4 w-full mt-4">
                        <p id="previewCategory" class="text-[0.65rem] font-black bg-white/10 border border-white/20 px-3 py-1.5 rounded-full mb-8 tracking-[0.2em] uppercase text-slate-300 backdrop-blur-md">카테고리</p>
                        
                        <div class="w-full flex justify-between items-center px-2 mb-10">
                            <div class="w-[42%] text-center">
                                <h4 id="previewA" class="text-xl md:text-2xl font-black text-blue-400 drop-shadow-[0_0_15px_rgba(96,165,250,0.5)] break-keep leading-tight">대상 A</h4>
                            </div>
                            <div class="w-[16%] text-center flex justify-center">
                                <span class="text-2xl font-black italic text-white opacity-90 drop-shadow-md">VS</span>
                            </div>
                            <div class="w-[42%] text-center">
                                <h4 id="previewB" class="text-xl md:text-2xl font-black text-red-400 drop-shadow-[0_0_15px_rgba(248,113,113,0.5)] break-keep leading-tight">대상 B</h4>
                            </div>
                        </div>

                        <!-- Gauge Bar -->
                        <div class="w-full px-2 mb-4">
                            <div class="flex justify-between text-sm font-black mb-3">
                                <span id="valA" class="text-blue-400 text-lg">0</span>
                                <span id="valB" class="text-red-400 text-lg">0</span>
                            </div>
                            <div class="w-full h-5 bg-slate-900 rounded-full overflow-hidden flex shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] border border-white/10">
                                <div id="barA" class="progress-bar h-full bg-gradient-to-r from-blue-700 to-blue-400" style="width: 0%"></div>
                                <div id="barB" class="progress-bar h-full bg-gradient-to-l from-red-700 to-red-400" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="mt-auto pb-10 w-full px-4">
                            <p id="previewTitle" class="text-center text-sm text-slate-200 font-medium leading-relaxed bg-black/50 p-3 rounded-xl border border-white/10 backdrop-blur-md"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-2">
                <!-- Button 2: 미리보기 -->
                <button id="btnPreview" onclick="renderPreview()" disabled class="bg-slate-700 hover:bg-slate-600 disabled:opacity-40 disabled:hover:bg-slate-700 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    선택한 주제 VS 결과물 보기
                </button>
                <!-- Button 3: 자동 게시 -->
                <button id="btnPublish" onclick="publishYoutube()" disabled class="bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 disabled:opacity-40 disabled:cursor-not-allowed text-white py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(220,38,38,0.3)]">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    유튜브 쇼츠 자동 게시
                </button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
